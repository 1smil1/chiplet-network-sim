# 16节点芯粒网络配置文件
# 拓扑: 2x2芯粒, 每个芯粒2x2节点 = 16节点总数
#
# 节点布局:
#   Chiplet(0,0): 节点0-3     Chiplet(1,0): 节点4-7
#   Chiplet(0,1): 节点8-11    Chiplet(1,1): 节点12-15
#
# 创建日期: 2024

[Network]
topology = MultiChipMesh
routing_algorithm = XY
k_node = 2
k_chip = 2
buffer_size = 20
vc_number = 2
d2d_IF = off_chip_serial

[Workload]
traffic = netrace

[Simulation]
injection_increment = 0.05

[Files]
netrace_file =./input/netrace/sequential_test.tra.bz2
output_file = ./output/output_16node.csv
log_file = ./output/log_16node.txt
