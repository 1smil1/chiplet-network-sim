[Network]
topology = MultiChipMesh
routing_algorithm = XY
k_node = 4
k_chip = 2
buffer_size = 20
vc_number = 2
# d2d_IF = off_chip_parallel
d2d_IF = off_chip_serial

[Workload]
traffic = netrace

[Simulation]
injection_increment = 0.05

[Files]
netrace_file =./input/netrace/stress_test.tra.bz2
output_file = ./output/output.csv
log_file = ./output/log.txt

